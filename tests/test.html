<script>
// ===== 内联核心逻辑（与 app.js / food-db.js 保持完全一致）=====

// 模拟 Device
const Device = {
  _id: 'test_device_001',
  getId() { return this._id; }
};

// 模拟 Storage（内存模式）
const _memStore = {};
const Storage = {
  _key(key) { return Device.getId() + '_' + key; },
  get(key, defaultVal = null) {
    try {
      const v = _memStore[this._key(key)];
      return v !== undefined ? JSON.parse(v) : defaultVal;
    } catch { return defaultVal; }
  },
  set(key, val) { _memStore[this._key(key)] = JSON.stringify(val); },
  remove(key) { delete _memStore[this._key(key)]; }
};

const Profile = {
  KEY: 'health_profile',
  ACTIVITY_MAP: { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 },
  get() { return Storage.get(this.KEY, null); },
  save(data) { Storage.set(this.KEY, data); },
  calcBMR(p) {
    if (p.gender === 'male') return 10*p.weight + 6.25*p.height - 5*p.age + 5;
    return 10*p.weight + 6.25*p.height - 5*p.age - 161;
  },
  calcTDEE(p) {
    const factor = this.ACTIVITY_MAP[p.activity] || 1.55;
    return Math.round(this.calcBMR(p) * factor);
  },
  calcMacroTargets(p) {
    const tdee = this.calcTDEE(p);
    let pR=0.20, cR=0.50, fR=0.30;
    if (p.goal==='lose')  { pR=0.30; cR=0.40; fR=0.30; }
    if (p.goal==='gain')  { pR=0.25; cR=0.50; fR=0.25; }
    return {
      calories: tdee,
      carbs: Math.round(tdee*cR/4),
      protein: Math.round(tdee*pR/4),
      fat: Math.round(tdee*fR/9),
      fiber: 25
    };
  },
  calcMealTargets(p) {
    const daily = this.calcMacroTargets(p);
    const ratios = { breakfast: 0.3, lunch: 0.4, dinner: 0.3 };
    const result = {};
    ['breakfast','lunch','dinner'].forEach(m => {
      const r = ratios[m];
      result[m] = {
        calories: Math.round(daily.calories * r),
        carbs: Math.round(daily.carbs * r),
        protein: Math.round(daily.protein * r),
        fat: Math.round(daily.fat * r),
        fiber: Math.round(daily.fiber * r)
      };
    });
    return result;
  },
  calcBMI(p) { const h = p.height/100; return +(p.weight/(h*h)).toFixed(1); },
  getBMILabel(bmi) {
    if (bmi < 18.5) return { label: '偏瘦', color: '#4ECDC4' };
    if (bmi < 24)   return { label: '正常', color: '#4CAF82' };
    if (bmi < 28)   return { label: '超重', color: '#F39C12' };
    return { label: '肥胖', color: '#E74C3C' };
  }
};
</script>

<script>
const IntakeCalc = {
  calcActual(estimated, percent) {
    const p = Math.max(1, Math.min(100, parseInt(percent) || 100)) / 100;
    return {
      calories: Math.round(estimated.calories * p),
      carbs:    Math.round(estimated.carbs    * p * 10) / 10,
      protein:  Math.round(estimated.protein  * p * 10) / 10,
      fat:      Math.round(estimated.fat      * p * 10) / 10,
      fiber:    Math.round((estimated.fiber || 0) * p * 10) / 10
    };
  }
};

const DietLog = {
  KEY_PREFIX: 'diet_log_',
  getKey(date) { return this.KEY_PREFIX + date; },
  getByDate(date) { return Storage.get(this.getKey(date), []); },
  addRecord(record) {
    const list = this.getByDate(record.date);
    record.id = Date.now() + Math.random();
    record.deviceId = Device.getId();
    list.push(record);
    Storage.set(this.getKey(record.date), list);
    return record;
  },
  removeRecord(date, recordId) {
    const list = this.getByDate(date).filter(r => r.id !== recordId);
    Storage.set(this.getKey(date), list);
  },
  getDayActualTotals(date) {
    const list = this.getByDate(date);
    const t = { calories:0, carbs:0, protein:0, fat:0, fiber:0 };
    list.forEach(r => {
      t.calories += r.actualCalories             || 0;
      t.carbs    += r.actualNutrition?.carbs     || 0;
      t.protein  += r.actualNutrition?.protein   || 0;
      t.fat      += r.actualNutrition?.fat       || 0;
      t.fiber    += r.actualNutrition?.fiber     || 0;
    });
    return {
      calories: Math.round(t.calories),
      carbs: Math.round(t.carbs*10)/10,
      protein: Math.round(t.protein*10)/10,
      fat: Math.round(t.fat*10)/10,
      fiber: Math.round(t.fiber*10)/10
    };
  },
  getCalorieDiff(date, tdee) {
    const actual = this.getDayActualTotals(date).calories;
    return tdee - actual;
  },
  getMealActualTotals(date, mealType) {
    const t = { calories:0, carbs:0, protein:0, fat:0, fiber:0 };
    this.getByDate(date).filter(r=>r.mealType===mealType).forEach(r => {
      t.calories += r.actualCalories             || 0;
      t.carbs    += r.actualNutrition?.carbs     || 0;
      t.protein  += r.actualNutrition?.protein   || 0;
      t.fat      += r.actualNutrition?.fat       || 0;
      t.fiber    += r.actualNutrition?.fiber     || 0;
    });
    return {
      calories: Math.round(t.calories),
      carbs: Math.round(t.carbs*10)/10,
      protein: Math.round(t.protein*10)/10,
      fat: Math.round(t.fat*10)/10,
      fiber: Math.round(t.fiber*10)/10
    };
  }
};
</script>

// ===== MealAdvisor =====
const MealAdvisor = {
  FOOD_TIPS: {
    carbs:   { low: ['米饭（约半碗≈100g）', '全麦面包（1片≈30g）', '红薯（半个≈100g）'], high: ['减少米饭', '少吃甜食和精制主食'] },
    protein: { low: ['鸡胸肉（100g≈31g蛋白）', '鸡蛋（1个≈6g蛋白）', '豆腐（150g≈12g蛋白）'], high: ['适量减少肉类摄入'] },
    fat:     { low: ['坚果（一小把）', '牛油果（半个）'], high: ['减少油炸食品', '烹饪少放油'] },
    fiber:   { low: ['绿叶蔬菜（150g）', '苹果（1个）', '燕麦（50g）'], high: ['膳食纤维过多可能引起不适'] }
  },
  evaluate(actual, target) {
    const ratio = target > 0 ? actual / target : 0;
    if (ratio < 0.8) return 'low';
    if (ratio > 1.2) return 'high';
    return 'ok';
  },
  generateAdvice(actual, target) {
    const advice = [];
    const nutrients = [
      { key: 'calories', name: '热量', unit: 'kcal' },
      { key: 'carbs',    name: '碳水', unit: 'g' },
      { key: 'protein',  name: '蛋白质', unit: 'g' },
      { key: 'fat',      name: '脂肪', unit: 'g' }
    ];
    nutrients.forEach(({ key, name, unit }) => {
      const status = this.evaluate(actual[key] || 0, target[key] || 1);
      const diff = Math.abs(Math.round((target[key] || 0) - (actual[key] || 0)));
      const tips = this.FOOD_TIPS[key] || { low: [], high: [] };
      if (status === 'low') {
        advice.push({ type: 'low', icon: '⬆️', title: `${name}摄入不足`, desc: `还差 ${diff}${unit}，建议补充：${tips.low.slice(0,2).join('、')}` });
      } else if (status === 'high') {
        advice.push({ type: 'high', icon: '⬇️', title: `${name}摄入超标`, desc: `超出 ${diff}${unit}，建议：${tips.high.join('、')}` });
      }
    });
    if (advice.length === 0) advice.push({ type: 'ok', icon: '✅', title: '营养均衡', desc: '今日营养摄入状况良好，继续保持！' });
    return advice;
  }
};

<script>
// ===== 测试框架 =====
let passed = 0, failed = 0;
const suites = [];
let currentSuite = null;

function describe(name, fn) {
  currentSuite = { name, tests: [] };
  suites.push(currentSuite);
  fn();
}

function it(name, fn) {
  try {
    fn();
    currentSuite.tests.push({ name, ok: true, detail: '' });
    passed++;
  } catch(e) {
    currentSuite.tests.push({ name, ok: false, detail: e.message });
    failed++;
  }
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected) throw new Error(`期望 ${JSON.stringify(expected)}，实际 ${JSON.stringify(actual)}`);
    },
    toBeCloseTo(expected, digits=1) {
      const d = Math.pow(10, -digits);
      if (Math.abs(actual - expected) > d) throw new Error(`期望约等于 ${expected}，实际 ${actual}`);
    },
    toBeGreaterThan(n) { if (actual <= n) throw new Error(`期望 > ${n}，实际 ${actual}`); },
    toBeLessThan(n) { if (actual >= n) throw new Error(`期望 < ${n}，实际 ${actual}`); },
    toBeGreaterThanOrEqual(n) { if (actual < n) throw new Error(`期望 >= ${n}，实际 ${actual}`); },
    toBeLessThanOrEqual(n) { if (actual > n) throw new Error(`期望 <= ${n}，实际 ${actual}`); },
    toBeTruthy() { if (!actual) throw new Error(`期望为真，实际 ${actual}`); },
    toBeFalsy()  { if (actual)  throw new Error(`期望为假，实际 ${actual}`); },
    toEqual(expected) {
      if (JSON.stringify(actual) !== JSON.stringify(expected))
        throw new Error(`期望 ${JSON.stringify(expected)}，实际 ${JSON.stringify(actual)}`);
    },
    toHaveLength(n) {
      if (actual.length !== n) throw new Error(`期望长度 ${n}，实际 ${actual.length}`);
    },
    not: {
      toBe(expected) { if (actual === expected) throw new Error(`期望不等于 ${JSON.stringify(expected)}`); },
      toBeNull() { if (actual === null) throw new Error('期望不为 null'); }
    }
  };
}

describe('MealAdvisor 建议生成', () => {
  it('56. 低摄入时评估为 low', () => {
    expect(MealAdvisor.evaluate(50, 200)).toBe('low');
  });
  it('57. 正常摄入时评估为 ok', () => {
    expect(MealAdvisor.evaluate(180, 200)).toBe('ok');
  });
  it('58. 高摄入时评估为 high', () => {
    expect(MealAdvisor.evaluate(300, 200)).toBe('high');
  });

  });

    expect(MealAdvisor.evaluate(240, 200)).toBe('ok');
  });
  it('61. target为0时评估为 low', () => {
    expect(MealAdvisor.evaluate(0, 0)).toBe('low');
  });

    const actual = { calories: 0, carbs: 0, protein: 0, fat: 0 };
    const target = { calories: 2000, carbs: 250, protein: 100, fat: 67 };
    const advice = MealAdvisor.generateAdvice(actual, target);
    expect(advice.length).toBeGreaterThan(0);
    expect(advice[0].type).toBe('low');
  });
  it('63. 全部达标时返回均衡建议', () => {
    const target = { calories: 2000, carbs: 250, protein: 100, fat: 67 };
    const actual = { calories: 2000, carbs: 250, protein: 100, fat: 67 };
    const advice = MealAdvisor.generateAdvice(actual, target);
    expect(advice.length).toBe(1);
    expect(advice[0].type).toBe('ok');
    expect(advice[0].title).toBe('营养均衡');
  });
  it('64. 超标时生成 high 建议', () => {
    const target = { calories: 2000, carbs: 250, protein: 100, fat: 67 };

    const advice = MealAdvisor.generateAdvice(actual, target);

});

<script>
// ===== 渲染结果 =====
const resultsEl = document.getElementById('test-results');
suites.forEach(suite => {
  const div = document.createElement('div');
  div.className = 'suite';
  const passCnt = suite.tests.filter(t=>t.ok).length;
  div.innerHTML = `<h2>${suite.name} <span style="font-size:12px;color:${passCnt===suite.tests.length?'#1E3932':'#C0392B'}">${passCnt}/${suite.tests.length}</span></h2>
  ${suite.tests.map(t => `<div class="test-item">
    <span class="status">${t.ok ? '✅' : '❌'}</span>
    <div>
      <div class="test-name">${t.name}</div>
      ${t.detail ? `<div class="test-detail">${t.detail}</div>` : (t.ok ? `<div class="test-detail pass-detail">通过</div>` : '')}
    </div>
  </div>`).join('')}`;
  resultsEl.appendChild(div);
});

const summaryEl = document.getElementById('summary');
const total = passed + failed;
if (failed === 0) {
  summaryEl.textContent = `✅ 全部 ${total} 项测试通过`;
  summaryEl.className = 'pass';
} else {
  summaryEl.textContent = `❌ ${failed} 项测试失败 / 共 ${total} 项`;
  summaryEl.className = 'fail';
}
</script>
