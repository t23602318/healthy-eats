<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>饮食记录 - HealthyEats</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-row">
    <h1>饮食记录</h1>
    <button class="back-btn" onclick="location.href='camera.html'" title="去拍照">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
</div>

<!-- Tab 切换 -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-day" onclick="switchTab('day')">📅 按日查看</button>
  <button class="tab-btn" id="tab-week" onclick="switchTab('week')">📆 按周汇总</button>
</div>

<!-- 日期导航（日视图） -->
<div id="day-nav" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card-white);border-bottom:1px solid var(--border);">
  <button onclick="changeDate(-1)" style="min-width:44px;min-height:44px;border:none;background:none;font-size:22px;cursor:pointer;color:var(--text-secondary)">‹</button>
  <span id="day-nav-label" style="font-size:15px;font-weight:500;"></span>
  <button onclick="changeDate(1)" id="next-day-btn" style="min-width:44px;min-height:44px;border:none;background:none;font-size:22px;cursor:pointer;color:var(--text-secondary)">›</button>
</div>

<!-- 主内容区 -->
<div id="records-content"></div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-sheet">
    <div class="modal-title">确认删除</div>
    <div class="modal-desc">确定要删除这条饮食记录吗？</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<!-- 浮动添加按钮 -->
<a href="camera.html" class="fab">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
  </svg>
</a>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="home">
    <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span>首页</span>
  </a>
  <a href="records.html" class="nav-item active" data-page="records">
    <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    <span>记录</span>
  </a>
  <a href="profile.html" class="nav-item" data-page="profile">
    <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>我的</span>
  </a>
</nav>

<script src="js/app.js"></script>
<script>
let currentTab = 'day';
let currentDate = DateUtil.today();
let pendingDeleteId = null;
let pendingDeleteDate = null;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-day').className = 'tab-btn' + (tab==='day' ? ' active' : '');
  document.getElementById('tab-week').className = 'tab-btn' + (tab==='week' ? ' active' : '');
  document.getElementById('day-nav').style.display = tab === 'day' ? 'flex' : 'none';
  render();
}

function changeDate(n) {
  currentDate = DateUtil.addDays(currentDate, n);
  const nextBtn = document.getElementById('next-day-btn');
  nextBtn.style.opacity = currentDate >= DateUtil.today() ? '0.3' : '1';
  nextBtn.disabled = currentDate >= DateUtil.today();
  updateDayNavLabel();
  render();
}

function updateDayNavLabel() {
  document.getElementById('day-nav-label').textContent = DateUtil.format(currentDate) + ' ' + DateUtil.formatDisplay(currentDate);
  document.getElementById('next-day-btn').disabled = currentDate >= DateUtil.today();
}
updateDayNavLabel();

function render() { currentTab === 'day' ? renderDay() : renderWeek(); }
function getProfile() { return Profile.get(); }

function renderDay() {
  const profile = getProfile();
  const tdee = profile ? Profile.calcTDEE(profile) : null;
  const list = DietLog.getByDate(currentDate);
  const actual = DietLog.getDayActualTotals(currentDate);
  const diff = tdee ? tdee - actual.calories : null;
  const content = document.getElementById('records-content');

  if (list.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🍽️</div>
      <p>暂无记录<br>去拍照记录今天的饮食吧</p>
      <a href="camera.html" class="btn btn-primary" style="margin-top:8px;">+ 去记录</a>
    </div>`;
    return;
  }

  let diffHTML = '';
  if (diff !== null) {
    const cls = diff >= 0 ? 'diff-positive' : 'diff-negative';
    const label = diff >= 0 ? `余量 ${diff} kcal` : `超标 ${Math.abs(diff)} kcal`;
    diffHTML = `<span class="${cls}">${label}</span>`;
  }

  let html = `<div class="day-header">
    <div class="day-header-date">${DateUtil.format(currentDate)} 共${list.length}条</div>
    <div class="day-header-stats">
      <span style="color:var(--text-secondary)">摄入 ${actual.calories} kcal</span>
      ${tdee ? `<span style="color:var(--text-secondary)">/ 目标 ${tdee}</span>` : ''}
      ${diffHTML}
    </div>
  </div>`;

  const sorted = [...list].sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));
  html += sorted.map(r => renderRecord(r)).join('');
  content.innerHTML = html;
}

function renderRecord(r) {
  const mealLabel = MEAL_NAMES[r.mealType] || r.mealType;
  const time = new Date(r.timestamp).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  const thumbHTML = r.imagePreview
    ? `<img src="${r.imagePreview}" alt="">`
    : `<span>🍱</span>`;
  const foodNames = (r.foods||[]).map(f=>f.name).join('、') || '食物';

  return `<div class="record-item">
    <div class="record-thumb">${thumbHTML}</div>
    <div class="record-info">
      <div class="record-name">${foodNames.length>18?foodNames.slice(0,18)+'…':foodNames}</div>
      <div class="record-meta">
        <span class="tag tag-green">${mealLabel}</span>
        <span>${time}</span>
      </div>
      <div class="record-cals">
        <span class="record-est">预估 ${r.estimatedCalories} kcal</span>
        <span style="color:var(--text-secondary)"> · 吃了${r.intakePercent||100}% · </span>
        <span class="record-actual">实摄 ${r.actualCalories} kcal</span>
      </div>
    </div>
    <button class="record-del" onclick="askDelete('${r.date}', ${r.id}, event)">🗑</button>
  </div>`;
}

function renderWeek() {
  const profile = getProfile();
  const tdee = profile ? Profile.calcTDEE(profile) : null;
  const dates = DateUtil.getWeekDates();
  const content = document.getElementById('records-content');

  let html = '';
  dates.reverse().forEach(date => {
    const list = DietLog.getByDate(date);
    const actual = DietLog.getDayActualTotals(date);
    const diff = tdee ? tdee - actual.calories : null;

    let diffHTML = '';
    if (diff !== null) {
      const cls = diff >= 0 ? 'diff-positive' : 'diff-negative';
      const label = diff >= 0 ? `余量 ${diff}` : `超标 ${Math.abs(diff)}`;
      diffHTML = `<span class="${cls} week-row-diff">${label} kcal</span>`;
    }

    const detailHTML = list.length > 0
      ? [...list].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(renderRecord).join('')
      : `<div style="text-align:center;padding:12px;color:var(--text-secondary);font-size:13px;">暂无记录</div>`;

    html += `<div class="week-row" id="week-row-${date}" onclick="toggleWeekRow('${date}')">
      <div class="week-row-header">
        <div>
          <div class="week-row-date">${DateUtil.format(date)} ${DateUtil.formatDisplay(date)}</div>
          <div class="week-row-summary" style="margin-top:3px;">
            共 ${list.length} 条 · 实摄 <strong>${actual.calories}</strong> kcal
            ${tdee ? `· 目标 ${tdee} kcal` : ''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          ${diffHTML}
          <span style="font-size:18px;color:var(--text-secondary);" id="week-arrow-${date}">›</span>
        </div>
      </div>
      <div class="week-row-detail">${detailHTML}</div>
    </div>`;
  });

  content.innerHTML = html || `<div class="empty-state"><div class="empty-icon">📅</div><p>本周暂无记录</p></div>`;
}

function toggleWeekRow(date) {
  const row = document.getElementById('week-row-' + date);
  const arrow = document.getElementById('week-arrow-' + date);
  row.classList.toggle('expanded');
  arrow.textContent = row.classList.contains('expanded') ? '⌄' : '›';
}

// ===== 删除 =====
function askDelete(date, id, e) {
  if (e) e.stopPropagation();
  pendingDeleteDate = date;
  pendingDeleteId = id;
  document.getElementById('delete-modal').classList.add('show');
}
function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('show');
  pendingDeleteId = null;
  pendingDeleteDate = null;
}
function confirmDelete() {
  if (pendingDeleteId !== null) {
    DietLog.removeRecord(pendingDeleteDate, pendingDeleteId);
    closeDeleteModal();
    setTimeout(render, 50);
    UI.showToast('记录已删除');
  }
}

render();
</script>
</body>
</html>
