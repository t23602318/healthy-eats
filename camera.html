<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>记录饮食 - HealthyEats</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-row">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>记录饮食</h1>
    <div style="width:36px"></div>
  </div>
</div>

<!-- Tab 切换 -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-photo" onclick="switchTab('photo')">📷 拍照识别</button>
  <button class="tab-btn" id="tab-manual" onclick="switchTab('manual')">🔍 手动选择</button>
</div>

<!-- ============ Tab 1: 拍照识别 ============ -->
<div id="panel-photo">
  <!-- 拍照区域 -->
  <div class="ai-photo-area" id="ai-photo-area">
    <input type="file" accept="image/*" id="ai-camera-input" class="camera-input">
    <div class="ai-photo-placeholder" id="ai-photo-placeholder">
      <div class="ai-photo-icon">📷</div>
      <div class="ai-photo-hint">拍照或选择图片，AI 自动识别食物</div>
      <button class="btn btn-primary btn-lg" onclick="document.getElementById('ai-camera-input').click()">拍照 / 选图</button>
    </div>
    <div class="ai-photo-preview" id="ai-photo-preview" style="display:none;">
      <img id="ai-preview-img" src="" alt="预览">
      <div class="ai-photo-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('ai-camera-input').click()">重新选择</button>
        <button class="btn btn-primary" id="btn-recognize" onclick="startRecognize()">🔄 重新识别</button>
      </div>
    </div>
  </div>

  <!-- 识别结果 -->
  <div id="ai-results" style="display:none;">
    <div class="card" style="margin:14px 16px;">
      <div class="card-title">🍽️ 识别结果</div>
      <div id="ai-description" style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;"></div>
      <div id="ai-food-list"></div>
      <div class="divider"></div>
      <div id="ai-nutrition-summary"></div>
    </div>

    <!-- 百分比 -->
    <div class="percent-section" style="margin:14px 16px;">
      <div class="percent-title">实际吃了多少？</div>
      <div class="percent-slider-row">
        <span style="font-size:13px;color:var(--text-secondary)">1%</span>
        <input type="range" min="1" max="100" value="100" class="percent-slider" id="ai-percent-slider">
        <span style="font-size:13px;color:var(--text-secondary)">100%</span>
        <input type="number" min="1" max="100" value="100" class="percent-input-box" id="ai-percent-input">
        <span style="font-size:14px;color:var(--text-secondary)">%</span>
      </div>
      <div class="actual-cal-display">
        <div class="ac-label">实际摄入热量</div>
        <div><span class="ac-val" id="ai-actual-cal">0</span> <span class="ac-unit">kcal</span></div>
        <div id="ai-actual-macros" style="font-size:12px;color:var(--text-secondary);margin-top:4px;"></div>
      </div>
    </div>

    <!-- 餐次选择 -->
    <div class="card" style="margin:0 16px 14px;">
      <div class="card-title">📌 记录到哪一餐？</div>
      <div style="display:flex;gap:8px;flex-wrap:nowrap;">
        <button class="btn btn-secondary" id="ai-btn-breakfast" style="flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;" onclick="selectAIMeal('breakfast')">🌅 早餐</button>
        <button class="btn btn-secondary" id="ai-btn-lunch" style="flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;" onclick="selectAIMeal('lunch')">☀️ 午餐</button>
        <button class="btn btn-secondary" id="ai-btn-dinner" style="flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;" onclick="selectAIMeal('dinner')">🌙 晚餐</button>
      </div>
    </div>

    <div style="padding:0 16px 20px;">
      <button class="btn btn-primary btn-full btn-lg" onclick="saveAIRecord()">✅ 记录到餐次</button>
    </div>
  </div>
</div>

<!-- ============ Tab 2: 手动选择 ============ -->
<div id="panel-manual" style="display:none;">

  <!-- 搜索栏 -->
  <div class="search-section">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜索食物..." autocomplete="off">
    </div>
  </div>

  <!-- 分类标签 -->
  <div class="category-pills" id="category-pills"></div>

  <!-- 食物搜索结果列表 -->
  <div class="food-results" id="food-results"></div>

  <!-- 已选食物列表 -->
  <div class="selected-section" id="selected-section">
    <div class="selected-header">
      <div class="selected-title">🍽️ 已选食物</div>
      <div class="selected-total" id="selected-total">0 kcal</div>
    </div>
    <div id="selected-list">
      <div class="selected-empty">点击上方食物添加到列表</div>
    </div>
  </div>

  <!-- 实际摄入百分比 -->
  <div class="percent-section" style="margin:14px 16px;">
    <div class="percent-title">实际吃了多少？</div>
    <div class="percent-slider-row">
      <span style="font-size:13px;color:var(--text-secondary)">1%</span>
      <input type="range" min="1" max="100" value="100" class="percent-slider" id="percent-slider">
      <span style="font-size:13px;color:var(--text-secondary)">100%</span>
      <input type="number" min="1" max="100" value="100" class="percent-input-box" id="percent-input">
      <span style="font-size:14px;color:var(--text-secondary)">%</span>
    </div>
    <div class="actual-cal-display">
      <div class="ac-label">实际摄入热量</div>
      <div><span class="ac-val" id="actual-cal-val">0</span> <span class="ac-unit">kcal</span></div>
      <div id="actual-macro-vals" style="font-size:12px;color:var(--text-secondary);margin-top:4px;"></div>
    </div>
  </div>

  <!-- 餐次选择 -->
  <div class="card" style="margin:0 16px 14px;">
    <div class="card-title">📌 记录到哪一餐？</div>
    <div style="display:flex;gap:8px;flex-wrap:nowrap;">
      <button class="btn btn-secondary" id="btn-breakfast" style="flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;" onclick="selectMeal('breakfast')">🌅 早餐</button>
      <button class="btn btn-secondary" id="btn-lunch" style="flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;" onclick="selectMeal('lunch')">☀️ 午餐</button>
      <button class="btn btn-secondary" id="btn-dinner" style="flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;" onclick="selectMeal('dinner')">🌙 晚餐</button>
    </div>
  </div>

  <div style="padding:0 16px 20px;">
    <button class="btn btn-primary btn-full btn-lg" onclick="saveRecord()">✅ 记录到餐次</button>
  </div>
</div>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="home">
    <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span>首页</span>
  </a>
  <a href="records.html" class="nav-item" data-page="records">
    <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    <span>记录</span>
  </a>
  <a href="profile.html" class="nav-item" data-page="profile">
    <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>我的</span>
  </a>
</nav>

<script src="js/app.js"></script>
<script src="js/food-db.js"></script>
<script>
// ===== 登录检查 =====
if (!Auth.requireLogin()) throw new Error('redirect');

// ===== Tab 切换 =====
function switchTab(tab) {
  document.getElementById('tab-photo').classList.toggle('active', tab === 'photo');
  document.getElementById('tab-manual').classList.toggle('active', tab === 'manual');
  document.getElementById('panel-photo').style.display = tab === 'photo' ? '' : 'none';
  document.getElementById('panel-manual').style.display = tab === 'manual' ? '' : 'none';
}

// ===== URL 参数 =====
const urlParams = new URLSearchParams(location.search);
const paramMeal = urlParams.get('meal');
const paramTab = urlParams.get('tab');

// ============================================================
//  Tab 1: 拍照识别
// ============================================================
let aiImageDataUrl = '';
let aiRecognizedData = null;
let aiCurrentMeal = paramMeal || getDefaultMealType();

// 拍照/选图
document.getElementById('ai-camera-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const dataUrl = await ImageUtil.compressImage(file);
    const resized = await ImageUtil.resizeForAI(dataUrl);
    aiImageDataUrl = resized;
    // Show preview
    document.getElementById('ai-photo-placeholder').style.display = 'none';
    document.getElementById('ai-photo-preview').style.display = '';
    document.getElementById('ai-preview-img').src = resized;
    // Reset results
    document.getElementById('ai-results').style.display = 'none';
    aiRecognizedData = null;
    // 自动开始识别
    startRecognize();
  } catch (err) {
    UI.showToast(err.message);
  }
  e.target.value = '';
});

// 开始识别
async function startRecognize() {
  if (!aiImageDataUrl) { UI.showToast('请先选择图片'); return; }

  UI.showLoading('AI 识别中...');

  try {
    let result;
    result = await FoodAI.recognizeFood(aiImageDataUrl);
    aiRecognizedData = result;
    renderAIResults(result);
  } catch (err) {
    if (err.message === 'NO_FOOD') {
      UI.showToast('未识别到食物，请换一张图片');
    } else {
      UI.showToast('识别失败：' + err.message);
    }
  } finally {
    UI.hideLoading();
  }
}

// 渲染识别结果
function renderAIResults(data) {
  document.getElementById('ai-results').style.display = '';
  document.getElementById('ai-description').textContent = data.description || '';

  // Food list table
  document.getElementById('ai-food-list').innerHTML = data.foods.map(f =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
      <div>
        <div style="font-size:14px;font-weight:500;">${f.name}</div>
        <div style="font-size:12px;color:var(--text-secondary);">${f.amount}${f.unit}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:14px;font-weight:600;color:var(--accent);">${f.calories} kcal</div>
        <div style="font-size:11px;color:var(--text-secondary);">蛋白${f.protein}g · 碳水${f.carbs}g · 脂肪${f.fat}g</div>
      </div>
    </div>`
  ).join('');

  // Nutrition summary
  const t = data.total;
  document.getElementById('ai-nutrition-summary').innerHTML =
    `<div style="display:flex;justify-content:space-around;text-align:center;padding:8px 0;">
      <div><div style="font-size:20px;font-weight:700;color:var(--primary);">${t.calories}</div><div style="font-size:11px;color:var(--text-secondary);">总热量 kcal</div></div>
      <div><div style="font-size:16px;font-weight:600;">${t.protein}</div><div style="font-size:11px;color:var(--text-secondary);">蛋白质 g</div></div>
      <div><div style="font-size:16px;font-weight:600;">${t.carbs}</div><div style="font-size:11px;color:var(--text-secondary);">碳水 g</div></div>
      <div><div style="font-size:16px;font-weight:600;">${t.fat}</div><div style="font-size:11px;color:var(--text-secondary);">脂肪 g</div></div>
    </div>`;

  updateAIActualDisplay();
  selectAIMeal(aiCurrentMeal);
}

// AI 百分比联动
const aiSlider = document.getElementById('ai-percent-slider');
const aiPercentInput = document.getElementById('ai-percent-input');

function updateAIActualDisplay() {
  if (!aiRecognizedData) return;
  const t = aiRecognizedData.total;
  const pct = Math.max(1, Math.min(100, parseInt(aiPercentInput.value) || 100));
  const actual = IntakeCalc.calcActual(t, pct);
  document.getElementById('ai-actual-cal').textContent = actual.calories;
  document.getElementById('ai-actual-macros').textContent =
    `碳水 ${actual.carbs}g · 蛋白质 ${actual.protein}g · 脂肪 ${actual.fat}g · 纤维 ${actual.fiber}g`;
}

aiSlider.addEventListener('input', () => { aiPercentInput.value = aiSlider.value; updateAIActualDisplay(); });
aiPercentInput.addEventListener('input', () => {
  let v = parseInt(aiPercentInput.value) || 1;
  v = Math.max(1, Math.min(100, v));
  aiSlider.value = v; aiPercentInput.value = v;
  updateAIActualDisplay();
});

// AI 餐次选择
function selectAIMeal(meal) {
  aiCurrentMeal = meal;
  ['breakfast','lunch','dinner'].forEach(m => {
    document.getElementById('ai-btn-'+m).className = 'btn ' + (m === meal ? 'btn-primary' : 'btn-secondary');
    document.getElementById('ai-btn-'+m).style.cssText = 'flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;';
  });
}
selectAIMeal(aiCurrentMeal);

// 保存 AI 识别记录
async function saveAIRecord() {
  if (!aiRecognizedData) { UI.showToast('请先完成识别'); return; }

  const t = aiRecognizedData.total;
  const pct = Math.max(1, Math.min(100, parseInt(aiPercentInput.value) || 100));
  const actual = IntakeCalc.calcActual(t, pct);

  // Generate thumbnail from the AI image
  let thumbnail = '';
  if (aiImageDataUrl) {
    thumbnail = await ImageUtil.makeThumbnail(aiImageDataUrl);
  }

  const record = {
    date: DateUtil.today(),
    mealType: aiCurrentMeal,
    foods: aiRecognizedData.foods,
    estimatedCalories: t.calories,
    intakePercent: pct,
    actualCalories: actual.calories,
    actualNutrition: { carbs: actual.carbs, protein: actual.protein, fat: actual.fat, fiber: actual.fiber },
    imagePreview: thumbnail,
    source: 'ai',
    description: aiRecognizedData.description || '',
    timestamp: new Date().toISOString()
  };

  DietLog.addRecord(record);
  UI.showToast(`已记录到${MEAL_NAMES[aiCurrentMeal]}！`);
  setTimeout(() => location.href = 'index.html', 1200);
}

// ============================================================
//  Tab 2: 手动选择 (保持原有功能)
// ============================================================
let selectedFoods = [];
let currentMeal = paramMeal || getDefaultMealType();
let thumbnailDataUrl = '';
let activeCategory = null;

// ===== 分类标签 =====
function renderCategories() {
  const cats = FoodDB.getCategories();
  const el = document.getElementById('category-pills');
  el.innerHTML = cats.map(c =>
    `<button class="cat-pill${activeCategory === c ? ' active' : ''}" onclick="selectCategory('${c}')">${c}</button>`
  ).join('');
}

function selectCategory(cat) {
  if (activeCategory === cat) {
    activeCategory = null;
  } else {
    activeCategory = cat;
    document.getElementById('search-input').value = '';
  }
  renderCategories();
  renderFoodList();
}

// ===== 搜索 =====
const searchInput = document.getElementById('search-input');
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    activeCategory = null;
    renderCategories();
    renderFoodList();
  }, 150);
});

function renderFoodList() {
  const el = document.getElementById('food-results');
  const kw = searchInput.value.trim();
  let items = [];

  if (kw) {
    items = FoodDB.search(kw);
  } else if (activeCategory) {
    items = FoodDB.getByCategory(activeCategory).slice(0, 20);
  } else {
    el.innerHTML = '<div class="empty-results">输入关键词搜索，或点击分类浏览</div>';
    return;
  }

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-results">未找到匹配的食物</div>';
    return;
  }

  el.innerHTML = items.map((item, idx) =>
    `<div class="food-result-item" onclick="addFood(${idx})" data-idx="${idx}">
      <div>
        <div class="food-result-name">${item.name}</div>
        <div class="food-result-meta">${item.category} · ${item.amount}${item.unit}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="food-result-cal">${item.calories} kcal</div>
        <div class="food-result-add">+</div>
      </div>
    </div>`
  ).join('');
  el._items = items;
}

// ===== 添加食物 =====
function addFood(idx) {
  const el = document.getElementById('food-results');
  const item = el._items[idx];
  if (!item) return;
  selectedFoods.push({ ...item, selectedAmount: item.amount });
  renderSelected();
  updateActualDisplay();
  UI.showToast(`已添加 ${item.name}`);
}

// ===== 已选食物列表 =====
function renderSelected() {
  const listEl = document.getElementById('selected-list');
  if (selectedFoods.length === 0) {
    listEl.innerHTML = '<div class="selected-empty">点击上方食物添加到列表</div>';
    document.getElementById('selected-total').textContent = '0 kcal';
    return;
  }

  let totalCal = 0;
  listEl.innerHTML = selectedFoods.map((f, i) => {
    const ratio = f.selectedAmount / f.amount;
    const cal = Math.round(f.calories * ratio);
    totalCal += cal;
    return `<div class="selected-item">
      <div class="selected-item-info">
        <div class="selected-item-name">${f.name}</div>
        <div class="selected-item-cal">${cal} kcal · 蛋白${(f.protein * ratio).toFixed(1)}g</div>
      </div>
      <div class="selected-item-amount">
        <input type="number" value="${f.selectedAmount}" min="1" max="9999"
          onchange="updateAmount(${i}, this.value)" onclick="event.stopPropagation()">
        <span class="unit">${f.unit}</span>
      </div>
      <button class="selected-item-del" onclick="removeFood(${i})">✕</button>
    </div>`;
  }).join('');
  document.getElementById('selected-total').textContent = totalCal + ' kcal';
}

function updateAmount(index, val) {
  const amount = Math.max(1, parseInt(val) || 1);
  selectedFoods[index].selectedAmount = amount;
  renderSelected();
  updateActualDisplay();
}

function removeFood(index) {
  selectedFoods.splice(index, 1);
  renderSelected();
  updateActualDisplay();
}

// ===== 计算总营养 =====
function calcTotalNutrition() {
  const totals = { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
  selectedFoods.forEach(f => {
    const ratio = f.selectedAmount / f.amount;
    totals.calories += f.calories * ratio;
    totals.protein += f.protein * ratio;
    totals.carbs += f.carbs * ratio;
    totals.fat += f.fat * ratio;
    totals.fiber += f.fiber * ratio;
  });
  return {
    calories: Math.round(totals.calories),
    protein: Math.round(totals.protein * 10) / 10,
    carbs: Math.round(totals.carbs * 10) / 10,
    fat: Math.round(totals.fat * 10) / 10,
    fiber: Math.round(totals.fiber * 10) / 10
  };
}

// ===== 百分比联动 =====
const slider = document.getElementById('percent-slider');
const percentInput = document.getElementById('percent-input');

function updateActualDisplay() {
  const total = calcTotalNutrition();
  const pct = Math.max(1, Math.min(100, parseInt(percentInput.value) || 100));
  const actual = IntakeCalc.calcActual(total, pct);
  document.getElementById('actual-cal-val').textContent = actual.calories;
  document.getElementById('actual-macro-vals').textContent =
    `碳水 ${actual.carbs}g · 蛋白质 ${actual.protein}g · 脂肪 ${actual.fat}g · 纤维 ${actual.fiber}g`;
}

slider.addEventListener('input', () => { percentInput.value = slider.value; updateActualDisplay(); });
percentInput.addEventListener('input', () => {
  let v = parseInt(percentInput.value) || 1;
  v = Math.max(1, Math.min(100, v));
  slider.value = v; percentInput.value = v;
  updateActualDisplay();
});

// ===== 餐次选择 =====
function selectMeal(meal) {
  currentMeal = meal;
  ['breakfast','lunch','dinner'].forEach(m => {
    document.getElementById('btn-'+m).className = 'btn ' + (m === meal ? 'btn-primary' : 'btn-secondary');
    document.getElementById('btn-'+m).style.cssText = 'flex:1;padding:12px 8px;font-size:14px;white-space:nowrap;';
  });
}
selectMeal(currentMeal);

// ===== 保存记录 =====
function saveRecord() {
  if (selectedFoods.length === 0) { UI.showToast('请先添加食物'); return; }

  const total = calcTotalNutrition();
  const pct = Math.max(1, Math.min(100, parseInt(percentInput.value) || 100));
  const actual = IntakeCalc.calcActual(total, pct);

  const foods = selectedFoods.map(f => {
    const ratio = f.selectedAmount / f.amount;
    return {
      name: f.name,
      amount: f.selectedAmount,
      unit: f.unit,
      calories: Math.round(f.calories * ratio),
      protein: Math.round(f.protein * ratio * 10) / 10,
      carbs: Math.round(f.carbs * ratio * 10) / 10,
      fat: Math.round(f.fat * ratio * 10) / 10,
      fiber: Math.round(f.fiber * ratio * 10) / 10
    };
  });

  const record = {
    date: DateUtil.today(),
    mealType: currentMeal,
    foods: foods,
    estimatedCalories: total.calories,
    intakePercent: pct,
    actualCalories: actual.calories,
    actualNutrition: { carbs: actual.carbs, protein: actual.protein, fat: actual.fat, fiber: actual.fiber },
    imagePreview: thumbnailDataUrl,
    source: 'manual',
    timestamp: new Date().toISOString()
  };

  DietLog.addRecord(record);
  UI.showToast(`已记录到${MEAL_NAMES[currentMeal]}！`);
  setTimeout(() => location.href = 'index.html', 1200);
}

// ===== 初始化 =====
