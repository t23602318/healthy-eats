<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - HealthyEats</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-title">🥗 HealthyEats</div>
    <div class="login-subtitle">健康饮食，从记录开始</div>

    <!-- Tabs -->
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" onclick="switchLoginTab('login')">登录</button>
      <button class="login-tab" id="tab-register" onclick="switchLoginTab('register')">注册</button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">账号</label>
        <input type="text" id="login-username" class="form-input" placeholder="请输入账号" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" id="login-password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <div class="form-error show" id="login-error" style="display:none;margin-bottom:14px;"></div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()">登录</button>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none;">
      <div class="form-group">
        <label class="form-label">账号（至少2个字符）</label>
        <input type="text" id="reg-username" class="form-input" placeholder="请输入账号" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">密码（至少4个字符）</label>
        <input type="password" id="reg-password" class="form-input" placeholder="请输入密码" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input type="password" id="reg-password2" class="form-input" placeholder="请再次输入密码" autocomplete="new-password">
      </div>
      <div class="form-error show" id="reg-error" style="display:none;margin-bottom:14px;"></div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doRegister()">注册</button>
    </div>
  </div>

  <div style="margin-top:24px;font-size:12px;color:var(--text-secondary);text-align:center;">
    数据存储在本地浏览器中，同一设备切换账号可查看不同数据
  </div>
</div>

<script src="js/app.js"></script>
<script>
// 如果已登录，直接跳转首页
if (Auth.isLoggedIn()) {
  location.href = 'index.html';
}

function switchLoginTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  hideErrors();
}

function hideErrors() {
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('reg-error').style.display = 'none';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogin() {
  hideErrors();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;

  if (!username || !password) {
    showError('login-error', '请输入账号和密码');
    return;
  }

  try {
    Auth.login(username, password);
    location.href = 'index.html';
  } catch (e) {
    showError('login-error', e.message);
  }
}

function doRegister() {
  hideErrors();
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;

  if (!username || !password) {
    showError('reg-error', '请填写完整信息');
    return;
  }

  if (password !== password2) {
    showError('reg-error', '两次输入的密码不一致');
    return;
  }

  try {
    Auth.register(username, password);
    location.href = 'index.html';
  } catch (e) {
    showError('reg-error', e.message);
  }
}

// Enter 键提交
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('reg-password2').addEventListener('keydown', e => {
  if (e.key === 'Enter') doRegister();
});
</script>
</body>
</html>
